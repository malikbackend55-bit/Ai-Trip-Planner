services:
  # Laravel Backend
  backend:
    build:
      context: ./aitp-backend
      dockerfile: Dockerfile
    image: aitp-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-aitp}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: ${DB_SSLMODE:-prefer}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-gemini-2.5-flash-lite}
      GEMINI_REQUEST_TIMEOUT: ${GEMINI_REQUEST_TIMEOUT:-60}
      GEMINI_CHAT_MAX_OUTPUT_TOKENS: ${GEMINI_CHAT_MAX_OUTPUT_TOKENS:-320}
      GEMINI_ITINERARY_MAX_OUTPUT_TOKENS: ${GEMINI_ITINERARY_MAX_OUTPUT_TOKENS:-4096}
      GEMINI_FATAL_COOLDOWN_SECONDS: ${GEMINI_FATAL_COOLDOWN_SECONDS:-900}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_REQUEST_TIMEOUT: ${MISTRAL_REQUEST_TIMEOUT:-60}
      MISTRAL_CHAT_MAX_TOKENS: ${MISTRAL_CHAT_MAX_TOKENS:-900}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:latest}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-120}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OPEN_METEO_ENABLED: ${OPEN_METEO_ENABLED:-false}
      OPEN_METEO_GEOCODING_URL: ${OPEN_METEO_GEOCODING_URL:-https://geocoding-api.open-meteo.com/v1/search}
      OPEN_METEO_FORECAST_URL: ${OPEN_METEO_FORECAST_URL:-https://api.open-meteo.com/v1/forecast}
      OPEN_METEO_TIMEOUT: ${OPEN_METEO_TIMEOUT:-12}
    networks:
      - aitp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aitp}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aitp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-aitp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # User Frontend (Web)
  user-app:
    build:
      context: ./aitp_app_user
      dockerfile: Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL:-http://owkgkkwckg0www4s4c0oww8s.45.32.155.226.sslip.io/api}
    image: aitp-user-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:8080}
    networks:
      - aitp-network

  # Admin Dashboard (Web)
  admin-dashboard:
    build:
      context: ./aitp_dashboard
      dockerfile: Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL:-}
    image: aitp-admin-dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:8080}
    networks:
      - aitp-network

networks:
  aitp-network:
    driver: bridge

volumes:
  postgres_data:
