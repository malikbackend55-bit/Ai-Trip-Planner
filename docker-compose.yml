services:
  # Laravel Backend
  backend:
    build:
      context: ./aitp-backend
      dockerfile: Dockerfile
    image: aitp-backend
    container_name: aitp-backend
    restart: unless-stopped
    env_file:
      - ./aitp-backend/.env
    ports:
      - "8000:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # DB_HOST, DB_PASSWORD, etc. should be set in Dokploy dashboard
    networks:
      - aitp-network

  # User Frontend (Web)
  user-app:
    build:
      context: ./aitp_app_user
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:8000/api # Default for local, override in Dokploy
    image: aitp-user-app
    container_name: aitp-user-app
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - aitp-network

  # Admin Dashboard (Web)
  admin-dashboard:
    build:
      context: ./aitp_dashboard
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:8000/api # Default for local, override in Dokploy
    image: aitp-admin-dashboard
    container_name: aitp-admin-dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - aitp-network

networks:
  aitp-network:
    driver: bridge
