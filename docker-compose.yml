services:
  # Laravel Backend
  backend:
    build:
      context: ./aitp-backend
      dockerfile: Dockerfile
    image: aitp-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - aitp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Frontend (Web)
  user-app:
    build:
      context: ./aitp_app_user
      dockerfile: Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL}
    image: aitp-user-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - aitp-network

  # Admin Dashboard (Web)
  admin-dashboard:
    build:
      context: ./aitp_dashboard
      dockerfile: Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL}
    image: aitp-admin-dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - aitp-network

networks:
  aitp-network:
    driver: bridge
