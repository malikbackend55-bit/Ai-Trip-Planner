services:
  # The Laravel Backend
  - type: web
    name: aitp-backend
    env: docker
    dockerContext: ./aitp-backend
    dockerfilePath: Dockerfile
    plan: free # Use the free tier
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: aitp-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: aitp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: aitp-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: aitp-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: aitp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aitp-db
          property: password
      - key: APP_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render Dashboard

databases:
  # The PostgreSQL Database
  - name: aitp-db
    plan: free
    region: oregon # or your preferred region
